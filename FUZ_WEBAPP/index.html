  <!-- SEZIONE CONTATTO -->
  <section class="contact-section">
    <h2>Contattami</h2>
    <p>Compila il modulo qui sotto per inviarmi una proposta o richiesta.</p>

    <form action="https://formsubmit.co/jacopo.fuse@gmail.com" method="POST" class="contact-form">
      
      <!-- Disabilita captcha -->
      <input type="hidden" name="_captcha" value="false">

      <input type="email" name="email" placeholder="La tua email" required>
      <input type="text" name="oggetto" placeholder="Oggetto" required>
      <textarea name="messaggio" rows="6" placeholder="Scrivi il tuo messaggio..." required></textarea>

      <button type="submit">Invia Email</button>
    </form>
  </section>
